<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../styles/popup.css">
    <script src="../lib/marked.min.js"></script>
    <script src="../shared/chatModes.js"></script>
    <script src="../shared/mentorModes.js"></script>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="toggle-ball">
                <label class="switch">
                    <input type="checkbox" id="toggleBall" checked>
                    <span class="slider round"></span>
                </label>
                <span class="toggle-label">显示悬浮球</span>
            </div>
            <div class="mentor-toggle-wrap">
                <button type="button" class="panel-mentor" id="mentorToggle" title="学习带教模式（苏格拉底式引导）" aria-pressed="false">🎓</button>
                <div class="mentor-popover" id="mentorPopover" hidden role="menu" aria-label="选择带教风格"></div>
            </div>
        </div>
        <div class="session-mode-bar">
            <span class="chat-mode-label">会话模式</span>
            <div class="chat-mode-group" id="chatModeGroup" role="radiogroup" aria-label="会话模式">
                <button type="button" class="chat-mode-btn" data-mode="web_persisted" aria-pressed="false">网页+入库</button>
                <button type="button" class="chat-mode-btn" data-mode="web_ephemeral" aria-pressed="false">网页+临时</button>
                <button type="button" class="chat-mode-btn" data-mode="web_selection" aria-pressed="false">选中+临时</button>
                <button type="button" class="chat-mode-btn" data-mode="chat_persisted" aria-pressed="false">纯聊+入库</button>
                <button type="button" class="chat-mode-btn" data-mode="chat_ephemeral" aria-pressed="false">纯聊+临时</button>
            </div>
            <div id="chatModeHint" class="chat-mode-hint">基于网页内容回答，且会写入知识库。</div>
        </div>
        <div id="chat-container" class="chat-container">
            <div id="messages" class="messages"></div>
        </div>
        <div class="input-container">
            <textarea id="userInput" placeholder="请输入您的问题..." rows="2"></textarea>
            <button id="askButton" class="send-button">
            </button>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
